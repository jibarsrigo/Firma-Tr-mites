<!DOCTYPE html>
<html lang="es">
<head>

<script>
const VERSION_HTML = "1.0.1";
</script>

<meta charset="UTF-8">
<title>Analizador V1.0</title>

<style>
body {
  font-family: system-ui;
  background: #f5f4f0;
  margin: 0;
  color:#1e1c17;
}

/* HEADER */
.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: white;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.header-left { display:flex; gap:14px; align-items:center;}

.badge {
  background:#01696f;
  color:white;
  font-size:10px;
  padding:2px 8px;
  border-radius:999px;
}

.ver-detalles {
  font-size:11px;
  color:#01696f;
  cursor:pointer;
}

.btn-mini {
  border:1px solid rgba(0,0,0,0.12);
  background:#fafafa;
  border-radius:999px;
  padding:6px 12px;
  cursor:pointer;
}

.header-right {
  margin-left:auto;
  font-size:12px;
  color:#6b6960;
}

/* LAYOUT */
.container { display:flex; }

.sidebar {
  width:320px;
  padding:16px;
  background:#faf9f7;
  border-right:1px solid rgba(0,0,0,0.08);
}

.main { flex:1; padding:18px; }

/* CARD */
.card {
  background:white;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  padding:12px;
  margin-bottom:14px;
}

.check {
  display:flex;
  gap:10px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:8px;
  padding:8px;
  margin-bottom:6px;
}

textarea {
  width:100%;
  height:140px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  padding:10px;
  font-family: monospace;
}

/* BOTONES */
.actions {
  display:flex;
  gap:10px;
}

#btnAnalizar {
  background:#01696f;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
}

#btnLimpiar {
  background:#eee;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
}

/* PANEL */
.panel {
  border-radius:12px;
  border:1px solid rgba(150,66,25,.2);
  background:#fdf0e8;
  margin-bottom:12px;
}

.panel-header {
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
}

.panel-body {
  padding:12px 14px;
}

.btn-close {
  border:1px solid rgba(0,0,0,0.1);
  background:white;
  border-radius:6px;
  padding:2px 8px;
  cursor:pointer;
}

.hidden { display:none; }

#placeholder {
  text-align:center;
  color:#999;
  margin-top:120px;
}
</style>

</head>

<body>

<div class="header">

  <div class="header-left">
    <b>Analizador de Trazas</b>

    <div>
      <div class="badge">v1.0</div>
      <div class="ver-detalles" id="btnDetalles">Ver detalles ▾</div>
    </div>

    <button class="btn-mini" id="btnActualizar">Actualizar</button>
  </div>

  <div class="header-right">
    html <span id="versionHTML"></span> -
    json <span id="versionJSON"></span> -
    js <span id="versionJS"></span>
    <a href="#" id="btnTabla">Reglas</a>
  </div>

</div>

<div class="container">

<div class="sidebar">

  <!-- ✅ PROBLEMAS ACCESO (MISMO COMPORTAMIENTO) -->
  <div class="card">
    <b>Problemas de acceso</b><br><br>

    <!-- ✅ AHORA SON RADIO EXCLUSIVO -->
    <label class="check">
      <input type="radio" name="problema" id="checkSaml">
      Error SAML
    </label>

    <label class="check">
      <input type="radio" name="problema" id="checkBlanco">
      Página en blanco
    </label>

  </div>

  <!-- ✅ TRAZA -->
  <div class="card">
    <b>Traza</b><br><br>
    <textarea id="inputTraza"></textarea>
  </div>

  <!-- ✅ NUEVO MÉTODO (copiado de tu versión original) -->
  <div class="card">

    <b>Método</b><br><br>

    <label class="check">
      <input type="radio" name="metodo" id="metodoClave"> Cl@ve
    </label>

    <label class="check">
      <input type="radio" name="metodo" id="metodoCert"> Certificado local
    </label>

  </div>

  <div class="actions">
    <button id="btnAnalizar">Analizar</button>
    <button id="btnLimpiar">Limpiar</button>
  </div>

</div>

<div class="main">

  <!-- ✅ PANEL ORIGINAL -->
  <div id="panel" class="panel hidden">
    <div class="panel-header">
      <span id="panelTitulo"></span>
      <button class="btn-close" id="btnCerrarPanel">Cerrar ✕</button>
    </div>
    <div class="panel-body" id="panelContenido"></div>
  </div>

  <div id="placeholder">
    Pega una traza y pulsa Analizar
  </div>

  <div id="resultado"></div>

</div>

</div>

<script src="Analiza_Formulario_Portafib.js"></script>

</body>
</html>
