<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de Trazas – V6</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f4f0;
}

/* ===== HEADER ===== */

.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
}

/* Badge beta */
.beta-box {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.badge {
  background: #01696f;
  color: white;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  width: fit-content;
}

.ver-detalles {
  font-size: 10px;
  color: #01696f;
  cursor: pointer;
  text-decoration: underline dotted;
}

/* Botón actualizar */
.btn-mini {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid #ddd;
  background: #f5f5f5;
  cursor: pointer;
}

.btn-mini:hover {
  background: #eee;
}

.header-right {
  margin-left: auto;
  text-align: right;
  font-size: 12px;
}

.ok { color: green; }
.warn { color: orange; }

/* ===== LAYOUT ===== */

.container {
  display: flex;
  height: calc(100vh - 52px);
}

.sidebar {
  width: 300px;
  background: #faf9f7;
  padding: 12px;
  border-right: 1px solid #ddd;
}

.main {
  flex: 1;
  padding: 20px;
}

/* ===== CARDS ===== */

.card {
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 12px;
}

/* ===== BOTONES ===== */

button {
  padding: 8px 12px;
  margin-top: 6px;
  cursor: pointer;
}

/* ===== PANEL DINÁMICO ===== */

.panel {
  border: 1px solid #e0c4ab;
  background: #fffaf5;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
}

.hidden {
  display: none;
}

.panel-header {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  margin-bottom: 8px;
}

/* ===== PLACEHOLDER ===== */

.placeholder {
  text-align: center;
  color: #999;
  margin-top: 120px;
}

.active {
  background: #e0f0ee;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">

  <div class="header-left">

    <!-- LOGO -->
    <div class="logo">
      🛡 Analizador de Trazas
    </div>

    <!-- BETA + DETALLES -->
    <div class="beta-box">
      <span class="badge">BETA V2</span>
      <span class="ver-detalles" id="btnDetalles">Ver detalles ▾</span>
    </div>

    <!-- ACTUALIZAR -->
    <button class="btn-mini" id="btnActualizar">↻ Actualizar</button>

  </div>

  <!-- DERECHA -->
  <div class="header-right">
    <div>Lectura <span id="jsonStatus">...</span></div>
    <div><a href="#" id="btnTabla">Tabla reglas</a></div>
  </div>

</div>

<!-- ===== CONTENT ===== -->
<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="card">
      <b>Problemas de acceso</b>

      <div>
        <input type="checkbox" id="checkSaml"> Error SAML
      </div>

      <div>
        <input type="checkbox" id="checkBlanco"> Página en blanco
      </div>
    </div>

    <div class="card">
      <b>Traza SistraHelp</b><br>
      <textarea style="width:100%;height:120px"></textarea>
    </div>

    <button id="btnAnalizar">Analizar</button>
    <button id="btnLimpiar">Limpiar</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- PANEL DINÁMICO -->
    <div id="panel" class="panel hidden">
      <div class="panel-header">
        <span id="panelTitulo"></span>
        <button id="cerrarPanel">Cerrar ✕</button>
      </div>
      <div id="panelContenido"></div>
    </div>

    <!-- PLACEHOLDER -->
    <div id="placeholder" class="placeholder">
      Pega una traza en el panel izquierdo y pulsa <b>Analizar</b>
    </div>

    <!-- RESULTADOS -->
    <div id="resultados" class="hidden">
      RESULTADOS (siguiente fase)
    </div>

  </div>
</div>

<script>

/* ===== PANEL DINÁMICO ===== */

function mostrarPanel(titulo, contenido) {
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("panelTitulo").innerText = titulo;
  document.getElementById("panelContenido").innerHTML = contenido;
}

function cerrarPanel() {
  document.getElementById("panel").classList.add("hidden");
}

/* ===== VER DETALLES ===== */

document.getElementById("btnDetalles").onclick = () => {
  mostrarPanel("Novedades BETA", `
    <ul>
      <li>Nuevo panel único (sin conflictos)</li>
      <li>Estados UI simplificados</li>
      <li>Preparado para nuevo motor de análisis</li>
      <li>Mejor experiencia visual</li>
    </ul>
  `);
};

/* ===== TABLA REGLAS ===== */

document.getElementById("btnTabla").onclick = (e) => {
  e.preventDefault();
  mostrarPanel("Tabla de reglas", `
    <ul>
      <li>Detección error SAML</li>
      <li>Página en blanco</li>
      <li>Clasificación de flujo</li>
      <li>Motor en desarrollo</li>
    </ul>
  `);
};

/* ===== CHECKS EXCLUSIVOS ===== */

const checkSaml = document.getElementById("checkSaml");
const checkBlanco = document.getElementById("checkBlanco");

checkSaml.onchange = () => {
  if (checkSaml.checked) {
    checkBlanco.checked = false;
    mostrarPanel("Información de acceso", "Error SAML detectado");
  } else cerrarPanel();
};

checkBlanco.onchange = () => {
  if (checkBlanco.checked) {
    checkSaml.checked = false;
    mostrarPanel("Información de acceso", "Página en blanco");
  } else cerrarPanel();
};

/* ===== ANALIZAR ===== */

document.getElementById("btnAnalizar").onclick = () => {
  cerrarPanel();
  document.getElementById("placeholder").classList.add("hidden");
  document.getElementById("resultados").classList.remove("hidden");
};

/* ===== LIMPIAR ===== */

document.getElementById("btnLimpiar").onclick = () => {
  checkSaml.checked = false;
  checkBlanco.checked = false;
  cerrarPanel();
  document.getElementById("resultados").classList.add("hidden");
  document.getElementById("placeholder").classList.remove("hidden");
};

/* ===== CERRAR ===== */

document.getElementById("cerrarPanel").onclick = cerrarPanel;

/* ===== CARGA REGLAS ===== */

async function cargarReglas() {
  try {
    const r = await fetch("reglas.json?v=" + Date.now());
    const datos = await r.json();
    document.getElementById("jsonStatus").innerText = "reglas.json v" + datos.version + " ✓";
    document.getElementById("jsonStatus").className = "ok";
  } catch {
    document.getElementById("jsonStatus").innerText = "reglas internas ⚠";
    document.getElementById("jsonStatus").className = "warn";
  }
}

cargarReglas();

/* ===== ACTUALIZAR ===== */

document.getElementById("btnActualizar").onclick = () => {
  location.href = location.pathname + "?v=" + Date.now();
};

</script>

</body>
</html>
