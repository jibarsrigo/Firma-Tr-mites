<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Analizador V6</title>

<style>

/* ===== BASE ===== */
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #f5f4f0;
  margin: 0;
  color: #1e1c17;
  font-size: 14px;
}

/* ===== HEADER ===== */
.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: white;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.header-left {
  display:flex;
  gap:14px;
  align-items:center;
}

.logo {
  font-weight:600;
}

.badge {
  background:#01696f;
  color:white;
  font-size:10px;
  padding:2px 8px;
  border-radius:999px;
  font-weight:600;
}

.ver-detalles {
  font-size:11px;
  color:#01696f;
  cursor:pointer;
  text-decoration: underline dotted;
}

.btn-mini {
  border:1px solid rgba(0,0,0,0.12);
  background:#fafafa;
  border-radius:999px;
  padding:6px 12px;
  font-size:12px;
  cursor:pointer;
}

.header-right {
  margin-left:auto;
  font-size:12px;
  color:#6b6960;
}

/* ===== LAYOUT ===== */
.container {
  display:flex;
  height: calc(100vh - 52px);
}

.sidebar {
  width:320px;
  padding:16px;
  background: #faf9f7;
  border-right: 1px solid rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.main {
  flex:1;
  padding:18px;
}

/* ===== CARDS ===== */
.card {
  background:white;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  overflow:hidden;
}

.card-header {
  padding:10px 12px;
  font-size:12px;
  font-weight:600;
  color:#6b6960;
  border-bottom:1px solid rgba(0,0,0,0.05);
  text-transform:uppercase;
  letter-spacing:.05em;
}

.card-body {
  padding:12px;
}

/* ===== CHECK CARDS ===== */
.check {
  display:flex;
  gap:10px;
  padding:8px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
}

.check:hover {
  background:#fafafa;
}

.check input {
  accent-color:#01696f;
}

/* ===== TEXTAREA ===== */
textarea {
  width:100%;
  min-height:200px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  background:#fafafa;
  font-family: monospace;
  font-size:12px;
  padding:10px;
}

textarea:focus {
  outline:none;
  border-color:#01696f;
  box-shadow:0 0 0 2px rgba(1,105,111,0.2);
}

/* ===== BOTONES ===== */
.actions {
  display:flex;
  gap:10px;
}

.btn-primary {
  background:#01696f;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
  font-weight:600;
}

.btn-secondary {
  background:#eee;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
}

/* ===== PANEL ===== */
.panel {
  border-radius:12px;
  border:1px solid rgba(150,66,25,.2);
  background:#fdf0e8;
  margin-bottom:12px;
}

.panel-header {
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
  color:#964219;
}

.panel-body {
  padding:12px 14px;
  font-size:13px;
  line-height:1.6;
}

.btn-close {
  border:1px solid #ddd;
  background:white;
  border-radius:6px;
  padding:2px 8px;
  cursor:pointer;
}

/* ===== PLACEHOLDER ===== */
#placeholder {
  text-align:center;
  color:#b0afa8;
  margin-top:140px;
}

.hidden { display:none; }

</style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🛡 Analizador de Trazas</div>

    <div>
      <div class="badge">BETA V2</div>
      <div class="ver-detalles" id="btnDetalles">Ver detalles ▾</div>
    </div>

    <button class="btn-mini" id="btnActualizar">Actualizar</button>
  </div>

  <div class="header-right">
    Lectura <span id="jsonStatus">...</span><br>
    <a href="#" id="btnTabla">Tabla reglas</a>
  </div>
</div>

<div class="container">

  <div class="sidebar">

    <!-- ACCESO -->
    <div class="card">
      <div class="card-header">Problemas de acceso</div>
      <div class="card-body">

        <label class="check">
          <input type="checkbox" id="checkSaml">
          <div>
            <b>Error SAML</b><br>
            <span style="font-size:12px;color:#6b6960">
            Pantalla de error al autenticarse
            </span>
          </div>
        </label>

        <label class="check">
          <input type="checkbox" id="checkBlanco">
          <div>
            <b>Página en blanco</b><br>
            <span style="font-size:12px;color:#6b6960">
            Pantalla vacía al acceder
            </span>
          </div>
        </label>

      </div>
    </div>

    <!-- TRAZA -->
    <div class="card">
      <div class="card-header">Traza SistraHelp</div>
      <div class="card-body">
        <div style="font-size:12px;color:#6b6960;margin-bottom:8px">
          Pega aquí
        </div>
        <textarea placeholder="Pega la traza de SistraHelp aquí...

Las trazas suelen mostrarse en orden reciente → antiguo."></textarea>
      </div>
    </div>

    <!-- BOTONES -->
    <div class="actions">
      <button class="btn-primary" id="btnAnalizar">Analizar</button>
      <button class="btn-secondary" id="btnLimpiar">Limpiar</button>
    </div>

  </div>

  <div class="main">

    <div id="panel" class="panel hidden">
      <div class="panel-header">
        <span id="panelTitulo"></span>
        <button class="btn-close" id="btnCerrarPanel">Cerrar ✕</button>
      </div>
      <div class="panel-body" id="panelContenido"></div>
    </div>

    <div id="placeholder">
      Pega una traza en el panel izquierdo y pulsa <b>Analizar</b>
    </div>

    <div id="resultados" class="hidden">RESULTADOS</div>

  </div>

</div>

<script>
/* (misma lógica que ya tienes, no la toco para no romper nada) */
</script>

</body>
</html>v
