<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de Trazas – V6</title>

<style>

/* ===== BASE ===== */
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  background: #f5f4f0;
  color: #1e1c17;
}

/* ===== HEADER ===== */
.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: white;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  font-weight: 600;
}

.beta-box {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.badge {
  background: #01696f;
  color: white;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
}

.ver-detalles {
  font-size: 10px;
  color: #01696f;
  cursor: pointer;
  text-decoration: underline dotted;
}

.btn-mini {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.12);
  background: #fafafa;
  cursor: pointer;
}

.btn-mini:hover {
  background: #f0f0f0;
}

.header-right {
  margin-left: auto;
  text-align: right;
  font-size: 12px;
}

.ok { color: #2e6e14; }
.warn { color: #964219; }

/* ===== LAYOUT ===== */

.container {
  display: flex;
  height: calc(100vh - 52px);
}

.sidebar {
  width: 300px;
  background: #faf9f7;
  padding: 16px;
  border-right: 1px solid rgba(0,0,0,0.08);
}

.main {
  flex: 1;
  padding: 16px 20px;
}

/* ===== CARDS ===== */

.card {
  background: white;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 14px;
}

/* ===== PANEL DINÁMICO (MEJORADO) ===== */

.panel {
  border-radius: 12px;
  border: 1px solid rgba(150,66,25,0.15);
  background: linear-gradient(180deg, #fffaf5 0%, #fdf0e8 100%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  overflow: hidden;
  margin-bottom: 14px;
}

.hidden {
  display: none;
}

/* Header panel */
.panel-header {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: #964219;
  border-bottom: 1px solid rgba(150,66,25,0.12);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Botón cerrar elegante */
.btn-close {
  background: none;
  border: none;
  font-size: 12px;
  color: #6b6960;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
}

.btn-close:hover {
  background: rgba(0,0,0,0.05);
}

/* Body panel */
.panel-body {
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.6;
}

/* ===== PLACEHOLDER ===== */

.placeholder {
  text-align: center;
  color: #b0afa8;
  margin-top: 120px;
}

/* ===== BOTONES ===== */

button {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#btnAnalizar {
  background: #01696f;
  color: white;
}

#btnLimpiar {
  background: #eee;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="header-left">

    <div class="logo">🛡 Analizador de Trazas</div>

    <div class="beta-box">
      <span class="badge">BETA V2</span>
      <span class="ver-detalles" id="btnDetalles">Ver detalles ▾</span>
    </div>

    <button class="btn-mini" id="btnActualizar">↻ Actualizar</button>

  </div>

  <div class="header-right">
    <div>Lectura <span id="jsonStatus">...</span></div>
    <div><a href="#" id="btnTabla">Tabla reglas</a></div>
  </div>

</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="card">
      <b>Problemas de acceso</b><br>
      <input type="checkbox" id="checkSaml"> Error SAML<br>
      <input type="checkbox" id="checkBlanco"> Página en blanco
    </div>

    <div class="card">
      <b>Traza SistraHelp</b><br>
      <textarea style="width:100%;height:120px"></textarea>
    </div>

    <button id="btnAnalizar">Analizar</button>
    <button id="btnLimpiar">Limpiar</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- PANEL -->
    <div id="panel" class="panel hidden">

      <div class="panel-header">
        <span id="panelTitulo"></span>
        <button class="btn-close" id="cerrarPanel">Cerrar ✕</button>
      </div>

      <div class="panel-body" id="panelContenido"></div>

    </div>

    <div id="placeholder" class="placeholder">
      Pega una traza en el panel izquierdo y pulsa <b>Analizar</b>
    </div>

    <div id="resultados" class="hidden">
      RESULTADOS (siguiente fase)
    </div>

  </div>
</div>

<script>

/* PANEL */

function mostrarPanel(titulo, contenido) {
  panel.classList.remove("hidden");
  placeholder.style.display = "none";
  panelTitulo.innerText = titulo;
  panelContenido.innerHTML = contenido;
}

function cerrarPanel() {
  panel.classList.add("hidden");
  placeholder.style.display = "";
}

/* ELEMENTOS */

const panel = document.getElementById("panel");
const panelTitulo = document.getElementById("panelTitulo");
const panelContenido = document.getElementById("panelContenido");
const placeholder = document.getElementById("placeholder");

/* VER DETALLES */
btnDetalles.onclick = () => {
  mostrarPanel("Novedades BETA", `
    <ul>
      <li>Nuevo panel único (sin conflictos)</li>
      <li>Estados UI simplificados</li>
      <li>Preparado para motor</li>
      <li>Mejor experiencia visual</li>
    </ul>
  `);
};

/* TABLA */
btnTabla.onclick = (e) => {
  e.preventDefault();
  mostrarPanel("Tabla de reglas", `
    <ul>
      <li>SAML</li>
      <li>Página en blanco</li>
      <li>Motor base</li>
    </ul>
  `);
};

/* CHECKS */
checkSaml.onchange = () => {
  if (checkSaml.checked) {
    checkBlanco.checked = false;
    mostrarPanel("Información de acceso", `<b>Error SAML detectado</b>`);
  } else cerrarPanel();
};

checkBlanco.onchange = () => {
  if (checkBlanco.checked) {
    checkSaml.checked = false;
    mostrarPanel("Información de acceso", `<b>Página en blanco</b>`);
  } else cerrarPanel();
};

/* ANALIZAR */
btnAnalizar.onclick = () => {
  cerrarPanel();
  placeholder.style.display = "none";
  resultados.classList.remove("hidden");
};

/* LIMPIAR */
btnLimpiar.onclick = () => {
  checkSaml.checked = false;
  checkBlanco.checked = false;
  cerrarPanel();
  resultados.classList.add("hidden");
  placeholder.style.display = "";
};

cerrarPanel.onclick = cerrarPanel;

/* REGLAS */
async function cargarReglas() {
  try {
    const r = await fetch("reglas.json?v=" + Date.now());
    const data = await r.json();
    jsonStatus.innerText = "reglas.json v" + data.version + " ✓";
    jsonStatus.className = "ok";
  } catch {
    jsonStatus.innerText = "reglas internas ⚠";
    jsonStatus.className = "warn";
  }
}

cargarReglas();

/* ACTUALIZAR */
btnActualizar.onclick = () => {
  location.href = location.pathname + "?v=" + Date.now();
};

</script>

</body>
</html>
