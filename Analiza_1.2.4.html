<!DOCTYPE html>
<html lang="es">
<head>

<script>
  const VERSION_HTML = "1.2.4";
</script>

<meta charset="UTF-8">
<title>Soporte Firma</title>

<style>
body {
  font-family: system-ui;
  background: #f5f4f0;
  margin: 0;
  color:#1e1c17;
}

.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: white;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.header-left { display:flex; gap:14px; align-items:center;}

.badge {
  background:#01696f;
  color:white;
  font-size:10px;
  padding:2px 8px;
  border-radius:999px;
}

.ver-detalles {
  font-size:11px;
  color:#01696f;
  cursor:pointer;
}

.btn-mini {
  border:1px solid rgba(0,0,0,0.12);
  background:#fafafa;
  border-radius:999px;
  padding:6px 12px;
  cursor:pointer;
}

.header-right {
  margin-left:auto;
  font-size:12px;
  color:#6b6960;
}

.container { display:flex; }

.sidebar {
  width:320px;
  padding:16px;
  background:#faf9f7;
  border-right:1px solid rgba(0,0,0,0.08);
}

.main { flex:1; padding:18px; }

.card {
  background:white;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  padding:12px;
  margin-bottom:14px;
}

.check {
  display:flex;
  gap:10px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:8px;
  padding:8px;
  margin-bottom:6px;
}

textarea {
  width:100%;
  height:100px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  padding:10px;
  font-family: monospace;
  box-sizing: border-box;
}

#inputFormulario {
  height:60px;
}

textarea:focus {
  outline:none;
  border-color:#01696f;
}

.actions {
  display:flex;
  gap:10px;
}

#btnAnalizar {
  background:#01696f;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
  cursor:pointer;
}

#btnLimpiar {
  background:#eee;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
  cursor:pointer;
}

.panel {
  border-radius:12px;
  border:1px solid rgba(150,66,25,.2);
  background:#fdf0e8;
  margin-bottom:12px;
}

.panel-header {
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
  color:#964219;
}

.panel-body {
  padding:12px 14px;
  font-size:13px;
}

.btn-close {
  border:1px solid rgba(0,0,0,0.1);
  background:white;
  border-radius:6px;
  padding:2px 8px;
  cursor:pointer;
}

.hidden { display:none; }

#placeholder {
  text-align:center;
  color:#999;
  margin-top:120px;
}

#resCAI {
  height: 200px;
}

.confianza-alta { color:#00aa44; font-weight:bold; }
.confianza-media { color:#ff9900; font-weight:bold; }
.confianza-baja { color:#cc0000; font-weight:bold; }

.info-formulario {
  background:#f0f7ff;
  border-left:4px solid #01696f;
  padding:8px 12px;
  margin:8px 0;
  font-size:12px;
}
</style>

</head>

<body>

<div class="header">
  <div class="header-left">
    <b>Soporte Firma</b>
    <div>
      <div class="badge">v1.2.4</div>
      <div class="ver-detalles" id="btnDetalles">Ver detalles ▾</div>
    </div>
    <button class="btn-mini" id="btnActualizar">Actualizar</button>
  </div>
  <div class="header-right">
    <span id="versionHTML"></span>
  </div>
</div>

<div class="container">

  <div class="sidebar">

    <div class="card">
      <b>Problemas de acceso</b><br><br>
      <label class="check">
        <input type="radio" name="problema" id="checkSaml"> Error SAML
      </label>
      <label class="check">
        <input type="radio" name="problema" id="checkBlanco"> Página en blanco
      </label>
    </div>

    <div class="card">
      <b>Traza</b><br><br>
      <textarea id="inputTraza" placeholder="Pega la traza aquí..."></textarea>
    </div>

    <div class="card">
      <b>Formulario recibido</b><br><br>
      <textarea id="inputFormulario" placeholder="Pega aquí el formulario recibido..."></textarea>
    </div>

    <div class="card">
      <b>Método</b><br><br>
      <label class="check">
        <input type="radio" name="metodo" id="metodoClave"> Cl@ve
      </label>
      <label class="check">
        <input type="radio" name="metodo" id="metodoCert"> Certificado local
      </label>
      <div id="bloqueSistema" style="display:none; margin-top:10px;">
        <b>Sistema</b><br><br>
        <label class="check">
          <input type="radio" name="sistema" id="sisPC">
          <div>Ordenador<br><span style="font-size:11px;color:#777;">Windows / Mac / Linux</span></div>
        </label>
        <label class="check">
          <input type="radio" name="sistema" id="sisMovil">
          <div>Dispositivo móvil<br><span style="font-size:11px;color:#777;">Android / iPhone / iPad</span></div>
        </label>
      </div>
    </div>

    <div class="actions">
      <button id="btnAnalizar">Analizar</button>
      <button id="btnLimpiar">Limpiar</button>
    </div>

  </div>

  <div class="main">

    <div id="placeholder">
      Pega una traza y pulsa Analizar
    </div>

    <div id="resultados" class="hidden">

      <!-- CONFIANZA -->
      <div class="card">
        <b>Nivel de confianza:</b>
        <div id="nivelConfianza" style="margin-top:8px;"></div>
      </div>

      <!-- DIAGNÓSTICO -->
      <div class="card">
        <b>Diagnóstico</b><br><br>
        <div id="resDiagnostico"></div>
      </div>

      <!-- INFORMACIÓN DEL FORMULARIO -->
      <div id="panelFormulario" class="card hidden">
        <b>Información del formulario</b><br><br>
        <div class="info-formulario">
          <div>📌 Método: <span id="resMetodo"></span></div>
          <div>📌 Trámite: <span id="resTramite"></span></div>
          <div>📌 Email: <span id="resEmail"></span></div>
        </div>
      </div>

      <!-- ACCIÓN RECOMENDADA -->
      <div class="card">
        <b>Acción recomendada</b><br><br>
        <div id="resAccionRecomendada"></div>
      </div>

      <!-- TEXTO PARA CAI -->
      <div class="card">
        <b>Texto para CAI</b><br><br>
        <textarea id="resCAI"></textarea>
      </div>

      <!-- AVISOS -->
      <div id="panelAvisos" class="card hidden">
        <b>⚠️ Avisos</b><br><br>
        <div id="listaAvisos" style="font-size:12px; color:#666;"></div>
      </div>

    </div>

  </div>

</div>

<!-- 🔹 ORDEN DE CARGA IMPORTANTE -->
<!-- 1. motor1.0.js → define funciones nuevas -->
<!-- 2. app.js → usa esas funciones -->
<script src="motor1.0.js"></script>
<script src="app.js"></script>

<script>
  // Mostrar versión
  document.getElementById("versionHTML").innerText = "HTML v" + VERSION_HTML;
  
  // Mostrar versión motor
  if (typeof VERSION_MOTOR !== "undefined") {
    document.getElementById("versionHTML").innerText += " | Motor v" + VERSION_MOTOR;
  }
</script>

</body>
</html>
