<style>
body {
  font-family: system-ui;
  background: #f5f4f0;
  margin: 0;
  color:#1e1c17;
}

/* HEADER */
.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: white;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.header-left { display:flex; gap:14px; align-items:center;}

.badge {
  background:#01696f;
  color:white;
  font-size:10px;
  padding:2px 8px;
  border-radius:999px;
}

.ver-detalles {
  font-size:11px;
  color:#01696f;
  cursor:pointer;
}

.btn-mini {
  border:1px solid rgba(0,0,0,0.12);
  background:#fafafa;
  border-radius:999px;
  padding:6px 12px;
  cursor:pointer;
}

.header-right {
  margin-left:auto;
  font-size:12px;
  color:#6b6960;
}

/* LAYOUT */
.container { display:flex; }

.sidebar {
  width:320px;
  padding:16px;
  background:#faf9f7;
  border-right:1px solid rgba(0,0,0,0.08);
}

.main { flex:1; padding:18px; }

/* CARD */
.card {
  background:white;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  padding:12px;
  margin-bottom:14px;
}

/* Cambios 2026-06-12: flujo visual compacto con marco blanco oculto hasta analizar */
#flujoVisualCard {
  display:none;
  /* Outline-only card: transparent background so it matches the results panel */
  background: transparent;
  /* More visible contour */
  border:1px solid rgba(0,0,0,0.14);
  border-radius:12px;
  padding:6px 10px;
  margin:0 auto 14px;
  box-sizing:border-box;
  max-width: calc(100% - 32px);
  /* Subtle shadow to lift the outline slightly from the background */
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

#flujoVisual {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}

/* Ensure label space below every step so vertical alignment is consistent */
.flujo-paso__label {
  min-height:20px; /* reserve vertical space even if label is empty */
  font-size:9px;
  color:#666;
  line-height:1.2;
  text-align:center;
}

.check {
  display:flex;
  gap:10px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:8px;
  padding:8px;
  margin-bottom:6px;
}

textarea {
  width:100%;
  height:100px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  padding:10px;
  font-family: monospace;
  box-sizing: border-box;
}

textarea:focus {
  outline:none;
  border-color:#01696f;
}

/* BOTONES */
.actions {
  display:flex;
  gap:10px;
}

#btnAnalizar {
  background:#01696f;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
}

#btnLimpiar {
  background:#eee;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
}

/* PANEL */
.panel {
  border-radius:12px;
  border:1px solid rgba(150,66,25,.2);
  background:#fdf0e8;
  margin-bottom:12px;
}

.panel-header {
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
  color:#964219;
}

.panel-body {
  padding:12px 14px;
  font-size:13px;
}

.btn-close {
  border:1px solid rgba(0,0,0,0.1);
  background:white;
  border-radius:6px;
  padding:2px 8px;
  cursor:pointer;
}

.hidden { display:none; }

#placeholder {
  text-align:center;
  color:#999;
  margin-top:120px;
}

#resultado {
  white-space: pre-line;
}

#resultado .literales {
  font-size: 11px;
  color: #666;
}
