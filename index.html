  color:#1e1c17;

  font-size: 11px;
  color: #666;
}

            <div class="opcion__titulo">La página queda en blanco</div>
            <div class="opcion__sub">Pantalla vacía al acceder al trámite</div>
          </div>
        </label>

      </div>
    </details>

    <!-- Traza (formato V5, plegable) -->
    <details class="panel-card" open>
      <summary class="panel-card__head">📋 Traza SistraHelp<span class="chevron">▾</span></summary>
      <div class="panel-card__body">
        <div class="campo-label">Pega aquí</div>
        <textarea id="inputTraza" placeholder="Pega la traza aquí..." title="Pega la traza de SistraHelp tal cual (orden inverso: lo más reciente arriba)"></textarea>
      </div>
    </details>

    <!-- Método (formato V5, misma lógica, plegable) -->
    <details class="panel-card" open>
      <summary class="panel-card__head">⚙ Método<span class="chevron">▾</span></summary>
      <div class="panel-card__body">

        <label class="opcion" title="Firma con Cl@ve (Cl@ve Firma / Cl@ve Permanente)">
          <input type="radio" name="metodo" id="metodoClave" checked>
          <div class="opcion__titulo">Cl@ve</div>
        </label>

        <label class="opcion" title="Firma con certificado instalado en el equipo del ciudadano (Autofirma / FIRE). Requiere certificado y, normalmente, la aplicación Autofirma">
          <input type="radio" name="metodo" id="metodoCert">
          <div class="opcion__titulo">Certificado local</div>
        </label>

        <div id="bloqueSistema" style="display:none; margin-top:10px;">
          <div class="campo-label">Sistema</div>

          <label class="opcion" title="Autofirma / FIRE en Windows, Mac o Linux">
            <input type="radio" name="sistema" id="sisPC">
            <div>
              <div class="opcion__titulo">Ordenador</div>
              <div class="opcion__sub">Windows / Mac / Linux</div>
            </div>
          </label>

          <label class="opcion" title="Autofirma App en Android o iPhone/iPad">
            <input type="radio" name="sistema" id="sisMovil">
            <div>
              <div class="opcion__titulo">Dispositivo móvil</div>
              <div class="opcion__sub">Android / iPhone / iPad</div>
            </div>
          </label>
        </div>

      </div>
    </details>

    <div class="actions">
      <button id="btnAnalizar" title="Analiza la traza con el método marcado. Atajo: Ctrl+Enter en el cuadro de texto">Analizar</button>
      <button id="btnLimpiar" title="Borra la traza, el resultado y vuelve a Cl@ve por defecto">Limpiar</button>
    </div>

  </div>

  <div class="main">

    <!-- ✅ PANEL ORIGINAL (NO TOCADO) -->
    <div id="panel" class="panel hidden">
      <div class="panel-header">
        <span id="panelTitulo"></span>
        <button class="btn-close" id="btnCerrarPanel">Cerrar ✕</button>
      </div>
      <div class="panel-body" id="panelContenido"></div>
    </div>

    <!-- ✅ PLACEHOLDER ORIGINAL -->
    <div id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c9c7c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 14px;" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Pega una traza y pulsa Analizar
      <div style="margin-top:6px;font-size:12px;color:#bdbcb6;">Ctrl V + Ctrl Enter</div>
    </div>

    <!-- ✅ RESULTADO (solo esto sustituye CAI y demás) -->

<!-- 🔹 NUEVO: flujo visual (formato tarjeta V5) -->
<!-- Cambio 2026-06-16: tarjeta con cabecera gris + cuerpo blanco; el contenedor solo se muestra tras pulsar Analizar -->
<div id="flujoVisualCard" class="panel-card">
  <div class="panel-card__head"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#01696f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="4" cy="12" r="2"/><circle cx="20" cy="12" r="2"/><path d="M6 12h4M14 12h4"/><rect x="10" y="9" width="4" height="6" rx="1"/></svg>Flujo del trámite</div>
  <div class="panel-card__body">
    <div id="flujoVisual"></div>
    <div id="flujoDiagnostico"></div>
    <div id="flujoFirmaDetalle"></div>
  </div>
</div>

<div id="resultado" style="white-space: normal;"></div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
