<!DOCTYPE html>
<html lang="es">
<head>

<script>
  // 🔹 VERSION HTML (editable manual)
  const VERSION_HTML = "1.2.9";
</script>

<!-- =====================================================
     FUNCIONALIDADES HTML
     =====================================================

     VERSION 1.2.9
     - PWA: manifest.json, icon-192/512, favicon, apple-touch-icon, theme-color
     - Atajos: autofocus en textarea; pista «Ctrl V + Ctrl Enter» bajo botones
     - Tooltips (title) en opciones de acceso, método y sistema
     - Cl@ve marcado por defecto al cargar y al pulsar Limpiar

     VERSION 1.2.8
     - Badge de versión del analizador en cabecera (js + acciones.json)
     - Botón Actualizar (recarga acciones.json) con icono en cabecera
     - Enlace «Reglas» y lectura html / json / js en header-right

     VERSION 1.2.7
     - Estilos literales: overflow-wrap para textos largos sin espacios
     - Clase .literal-pequeno en tarjeta de literales detectados

     VERSION 1.2.6
     - Sidebar con apartados plegables (details/summary + chevron)
     - Bloque «Problemas de acceso» (SAML / página en blanco) plegable;
       al cerrar limpia selección y panel de ayuda
     - Etiquetas .opcion__titulo / .opcion__sub en método y sistema

     VERSION 1.2.5
     - Tarjeta «Flujo del trámite» (#flujoVisualCard): píldoras TR_ + #flujoDiagnostico
     - Formato panel-card V5 (cabecera grise + cuerpo blanco) en flujo y resultados
     - Flujo oculto hasta analizar; marco compacto (width: fit-content)
     - Tarjetas Acción y Literales detectados con cabecera e icono SVG

     VERSION 1.2.4
     - Rediseño visual estilo V5: escudo en marca, cabecera blanca, sidebar #faf9f7
     - Panel emergente validación (Portafib / formulario) con estilo naranja
     - Placeholder centrado y zona #resultado con tarjetas dinámicas

     VERSION 1.2.1
     - Layout completo: header + sidebar + zona principal
     - Panel de cabecera con versión HTML / JSON / JS y botón actualizar
     - Entrada de traza (textarea monospace), selector Cl@ve / Certificado
     - Selector dinámico de sistema (Ordenador / móvil) solo con certificado
     - Botones Analizar y Limpiar; panel resultado conectado a app.js

     VERSION 1.2.0
     - Separación sidebar + main; panel de resultado independiente

     VERSION 1.1
     - Tarjetas (cards) y panel emergente reutilizable

     VERSION 1.0
     - Estructura base: entrada de traza y botón de análisis

     Nota: desde app.js v1.3.0 los cambios de reglas, flujo y acciones CAU
     están en app.js y acciones.json; el HTML no cambia de estructura.
-->

<style>
  .literales {
    font-size: 11px;
    color: #666;
  }

  /* 🔹 NUEVO: flujo textual */
  .flujo-texto {
    font-size: 11px;
    color: #666;
  }

  /* Texto de literal ligeramente más pequeño */
  .literal-pequeno {
    font-size: 12px;
    color: #444;
    margin-top: 6px;
    line-height: 1.3;
    /* Evita que un literal largo sin espacios desborde el ancho de la tarjeta */
    overflow-wrap: anywhere;
    word-break: break-word;
  }
</style>
  
<meta charset="UTF-8">
<title>Analizador de Trazas</title>

<!-- Icono / PWA (barra de tareas al abrir con Chrome --app). Cambiar ?v= si no refresca el icono -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=1">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=1">
<link rel="shortcut icon" href="favicon.ico?v=1">
<link rel="apple-touch-icon" href="icon-192.png?v=1">
<link rel="manifest" href="manifest.json?v=1">
<meta name="theme-color" content="#01696f">

<style>
body {
  font-family: system-ui;
  background: #f5f4f0;
  margin: 0;
  color:#1e1c17;
}

/* HEADER */
.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  background: white;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.header-left { display:flex; gap:14px; align-items:center;}

.brand { display:flex; align-items:center; gap:8px; }
.brand__title {
  font-family: system-ui;
  font-size:16px;
  font-weight:600;
  color:#1e1c17;
}

.badge {
  background:#01696f;
  color:white;
  font-size:10px;
  padding:3px 10px;
  border-radius:999px;
}

.ver-detalles {
  font-size:11px;
  color:#01696f;
  cursor:pointer;
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 3px;
  display: inline-block;
  width: fit-content;
}

.btn-mini {
  border:1px solid rgba(0,0,0,0.12);
  background:#fafafa;
  border-radius:999px;
  padding:6px 12px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family: system-ui;
  font-size:11px;
  color:#1e1c17;
}

.header-right {
  margin-left:auto;
  font-size:12px;
  color:#6b6960;
}

/* LAYOUT */
.container { display:flex; min-height: calc(100vh - 52px); }

.sidebar {
  width:320px;
  padding:16px;
  background:#faf9f7;
  border-right:1px solid rgba(0,0,0,0.08);
}

.main { flex:1; padding:18px; }

/* CARD */
.card {
  background:white;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  padding:12px;
  margin-bottom:14px;
}

/* Cambios 2026-06-16: la tarjeta del flujo usa el formato V5 (cabecera gris + cuerpo blanco) */
#flujoVisualCard {
  display:none; /* se muestra solo tras analizar */
  /* El marco se ajusta al ancho del flujo, no a todo el panel */
  width: fit-content;
  max-width: 100%;
}

#flujoVisual {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  /* Espacio a cada lado (aprox. el ancho de la palabra "ESPACIO") para ampliar el marco del flujo */
  padding:0 60px;
}

/* Frase explicativa del diagnóstico, dentro de la tarjeta del flujo y separada de las píldoras */
#flujoDiagnostico {
  display:none;
  margin-top:4px;
  padding-top:12px;
  border-top:1px solid rgba(0,0,0,0.06);
  font-size:12px;
  color:#555;
}

/* Ensure label space below every step so vertical alignment is consistent */
.flujo-paso__label {
  min-height:20px; /* reserve vertical space even if label is empty */
  font-size:9px;
  color:#666;
  line-height:1.2;
  text-align:center;
}

.check {
  display:flex;
  gap:10px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:8px;
  padding:8px;
  margin-bottom:6px;
}

/* Formato V5: tarjeta con cabecera gris + cuerpo blanco */
.panel-card {
  background:white;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:12px;
  margin-bottom:14px;
  overflow:hidden;
}
.panel-card__head {
  background:#ececea;
  padding:9px 12px;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.4px;
  text-transform:uppercase;
  color:#6b6960;
  display:flex;
  align-items:center;
  gap:6px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.panel-card__body { padding:12px; }

/* Apartado plegable (details/summary) */
summary.panel-card__head {
  cursor:pointer;
  user-select:none;
  list-style:none;
}
summary.panel-card__head::-webkit-details-marker { display:none; }
.chevron { margin-left:auto; transition: transform .2s; display:inline-block; color:#9a9890; }
details[open] > summary.panel-card__head .chevron { transform: rotate(180deg); }
details:not([open]) > summary.panel-card__head { border-bottom:none; }
.opcion {
  display:flex;
  gap:10px;
  align-items:flex-start;
  border:1px solid rgba(0,0,0,0.10);
  border-radius:8px;
  padding:10px;
  margin-bottom:8px;
  cursor:pointer;
}
.opcion:last-child { margin-bottom:0; }
.opcion__titulo { font-weight:600; font-size:13px; color:#1e1c17; }
.opcion__sub { font-size:11px; color:#8a8780; margin-top:2px; }
.campo-label { font-size:12px; color:#6b6960; margin-bottom:6px; }

textarea {
  width:100%;
  height:100px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  padding:10px;
  font-family: monospace;
  box-sizing: border-box;
}

textarea:focus {
  outline:none;
  border-color:#01696f;
}

/* BOTONES */
.actions {
  display:flex;
  gap:10px;
}

#btnAnalizar {
  background:#01696f;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
}

#btnLimpiar {
  background:#eee;
  border:none;
  border-radius:8px;
  padding:10px;
  flex:1;
}

/* PANEL */
.panel {
  border-radius:12px;
  border:1px solid rgba(150,66,25,.2);
  background:#fdf0e8;
  margin-bottom:12px;
}

.panel-header {
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
  color:#964219;
}

.panel-body {
  padding:12px 14px;
  font-size:13px;
}

.btn-close {
  border:1px solid rgba(0,0,0,0.1);
  background:white;
  border-radius:6px;
  padding:2px 8px;
  cursor:pointer;
}

.hidden { display:none; }

#placeholder {
  text-align:center;
  color:#999;
  margin-top:120px;
}

#resultado {
  white-space: pre-line;
}

#resultado .literales {
  font-size: 11px;
  color: #666;
}

</style>

</head>

<body>

<div class="header">

  <div class="header-left">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#01696f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span class="brand__title">Analizador de Trazas</span>
    </div>

    <div style="display:flex; flex-direction:column; align-items:flex-start; gap:2px;">
      <div class="badge" id="versionBadge">v 1.3.13</div>
      <div class="ver-detalles" id="btnDetalles">Ver detalles ▾</div>
    </div>

    <button class="btn-mini" id="btnActualizar" title="Recarga las reglas y textos desde acciones.json (sin recargar toda la página). Úsalo si has cambiado el JSON."><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Actualizar</button>
  </div>

  <div class="header-right">
   Lectura:
<span id="versionHTML"></span>
-
<span id="versionJSON"></span>
-
<span id="versionJS"></span>
    <a href="#" id="btnTabla">Reglas</a>
  </div>

</div>

<div class="container">

  <div class="sidebar">

    <!-- Problemas de acceso (formato V5, plegable) -->
    <details class="panel-card" id="cardAcceso">
      <summary class="panel-card__head">🔐 Problemas de acceso<span class="chevron">▾</span></summary>
      <div class="panel-card__body">

        <label class="opcion" title="El ciudadano ve una pantalla de error SAML al autenticarse (problema de certificado o de contraseña Cl@ve). Muestra ayuda al seleccionarlo.">
          <input type="radio" name="problema" id="checkSaml">
          <div>
            <div class="opcion__titulo">El ciudadano ve error SAML</div>
            <div class="opcion__sub">Pantalla de error SAML al autenticarse</div>
          </div>
        </label>

        <label class="opcion" title="El trámite carga una pantalla vacía/en blanco al acceder. Muestra ayuda al seleccionarlo.">
          <input type="radio" name="problema" id="checkBlanco">
          <div>
            <div class="opcion__titulo">La página queda en blanco</div>
            <div class="opcion__sub">Pantalla vacía al acceder al trámite</div>
          </div>
        </label>

      </div>
    </details>

    <!-- Traza (formato V5, plegable) -->
    <details class="panel-card" open>
      <summary class="panel-card__head">📋 Traza SistraHelp<span class="chevron">▾</span></summary>
      <div class="panel-card__body">
        <div class="campo-label">Pega aquí</div>
        <textarea id="inputTraza" placeholder="Pega la traza aquí..."></textarea>
      </div>
    </details>

    <!-- Método (formato V5, misma lógica, plegable) -->
    <details class="panel-card" open>
      <summary class="panel-card__head">⚙ Método<span class="chevron">▾</span></summary>
      <div class="panel-card__body">

        <label class="opcion" title="Firma con Cl@ve (Cl@ve Firma / Cl@ve Permanente). El ciudadano firma en la nube, sin certificado instalado en su equipo.">
          <input type="radio" name="metodo" id="metodoClave" checked>
          <div class="opcion__titulo">Cl@ve</div>
        </label>

        <label class="opcion" title="Firma con certificado instalado en el equipo del ciudadano (Autofirma / FIRE). Requiere certificado y, normalmente, la aplicación Autofirma.">
          <input type="radio" name="metodo" id="metodoCert">
          <div class="opcion__titulo">Certificado local</div>
        </label>

        <div id="bloqueSistema" style="display:none; margin-top:10px;">
          <div class="campo-label">Sistema</div>

          <label class="opcion">
            <input type="radio" name="sistema" id="sisPC">
            <div>
              <div class="opcion__titulo">Ordenador</div>
              <div class="opcion__sub">Windows / Mac / Linux</div>
            </div>
          </label>

          <label class="opcion">
            <input type="radio" name="sistema" id="sisMovil">
            <div>
              <div class="opcion__titulo">Dispositivo móvil</div>
              <div class="opcion__sub">Android / iPhone / iPad</div>
            </div>
          </label>
        </div>

      </div>
    </details>

    <div class="actions">
      <button id="btnAnalizar">Analizar</button>
      <button id="btnLimpiar">Limpiar</button>
    </div>

  </div>

  <div class="main">

    <!-- ✅ PANEL ORIGINAL (NO TOCADO) -->
    <div id="panel" class="panel hidden">
      <div class="panel-header">
        <span id="panelTitulo"></span>
        <button class="btn-close" id="btnCerrarPanel">Cerrar ✕</button>
      </div>
      <div class="panel-body" id="panelContenido"></div>
    </div>

    <!-- ✅ PLACEHOLDER ORIGINAL -->
    <div id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c9c7c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 14px;" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Pega una traza y pulsa Analizar
      <div style="margin-top:6px;font-size:12px;color:#bdbcb6;">Ctrl V + Ctrl Enter</div>
    </div>

    <!-- ✅ RESULTADO (solo esto sustituye CAI y demás) -->

<!-- 🔹 NUEVO: flujo visual (formato tarjeta V5) -->
<!-- Cambio 2026-06-16: tarjeta con cabecera gris + cuerpo blanco; el contenedor solo se muestra tras pulsar Analizar -->
<div id="flujoVisualCard" class="panel-card">
  <div class="panel-card__head"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#01696f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="4" cy="12" r="2"/><circle cx="20" cy="12" r="2"/><path d="M6 12h4M14 12h4"/><rect x="10" y="9" width="4" height="6" rx="1"/></svg>Flujo del trámite</div>
  <div class="panel-card__body">
    <div id="flujoVisual"></div>
    <div id="flujoDiagnostico"></div>
  </div>
</div>

<div id="resultado" style="white-space: normal;"></div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
